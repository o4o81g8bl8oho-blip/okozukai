<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FAF2E5">
<meta name="apple-mobile-web-app-title" content="おこづかい帳">
<meta name="description" content="おこづかい帳 — じぶんの「何にいくら」を見える化しよう！">
<title>おこづかい帳</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FAF2E5;
  --card: #FFFBF1;
  --line: #F0E2CE;
  --ink: #7B6353;
  --sub: #B29C8A;
  --sub2: #C4B2A2;
  --pink: #EFA9B5;
  --pink-deep: #E08A9B;
  --field: #FDF8EE;
  --stroke: #A98E76;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: 'M PLUS Rounded 1c', 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', sans-serif;
  background: var(--bg);
  color: var(--ink);
  display: flex;
  justify-content: center;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; }
input { font-family: inherit; color: var(--ink); }
input::placeholder { color: #CDBBA9; }
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
input[type=number] { -moz-appearance: textfield; appearance: textfield; }
button:focus-visible, input:focus-visible { outline: 2.5px solid var(--pink); outline-offset: 2px; }
@media (prefers-reduced-motion: reduce) { * { transition: none !important; } }

.app {
  width: 100%; max-width: 430px; min-height: 100dvh;
  display: flex; flex-direction: column; position: relative;
}
.header {
  display: flex; align-items: center; gap: 10px;
  padding: calc(16px + env(safe-area-inset-top)) 16px 8px;
  position: relative;
}
.avatar {
  width: 46px; height: 46px; border-radius: 99px; background: #FDEFE0;
  border: 1.5px solid var(--line); display: flex; align-items: flex-end;
  justify-content: center; overflow: hidden; flex-shrink: 0;
}
.h-title {
  flex: 1; text-align: center;
  font-size: 22px; font-weight: 800; letter-spacing: 0.16em; color: #93796A;
}
.menu-btn {
  width: 42px; height: 42px; border-radius: 99px;
  border: 1.5px solid var(--line); background: #FFFBF1;
  font-size: 18px; font-weight: 800; color: var(--sub); cursor: pointer;
  box-shadow: 0 1px 3px rgba(123,99,83,0.08); flex-shrink: 0;
  line-height: 1; padding-bottom: 8px;
}
.deco-cloud { position: absolute; opacity: .8; pointer-events: none; }

main { flex: 1; padding: 6px 14px calc(104px + env(safe-area-inset-bottom)); }

.card {
  background: var(--card); border-radius: 22px; padding: 16px;
  border: 1.5px solid var(--line);
  box-shadow: 0 2px 8px rgba(150,120,90,0.07); margin-bottom: 14px;
}
.card-heading {
  font-size: 14px; font-weight: 800; margin: 2px 0 10px;
  display: flex; align-items: center; gap: 7px;
}
.card-heading svg { flex-shrink: 0; }
.section-title {
  font-size: 14px; font-weight: 800; margin: 16px 6px 8px;
  display: flex; align-items: center; gap: 7px;
}
.empty {
  background: var(--card); border: 1.8px dashed #E2CFB6; border-radius: 22px;
  padding: 20px; text-align: center; font-size: 13px; color: var(--sub);
  font-weight: 700; line-height: 1.7;
}

/* 金額カード */
.amount-flex { display: flex; align-items: flex-end; gap: 4px; }
.amount-left { flex: 1; min-width: 0; padding-bottom: 18px; }
.amount-row {
  display: flex; align-items: baseline; gap: 8px;
  padding: 4px 2px 0;
}
.amount-yen { font-size: 26px; font-weight: 800; color: #93796A; }
.amount-input {
  flex: 1; border: none; outline: none; font-size: 42px; font-weight: 800;
  background: transparent; font-variant-numeric: tabular-nums; width: 100%; min-width: 0;
  color: #8A6F5D;
}
.amount-input::placeholder { color: #D8C4AE; }
.amount-underline { border-bottom: 2px dashed #E8D6BE; margin-top: 2px; }
.bunny-wrap { width: 46%; max-width: 175px; flex-shrink: 0; margin-bottom: -16px; }
.bunny-wrap svg { display: block; width: 100%; height: auto; }

/* 費目チップ */
.chip-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 8px; }
.chip {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  padding: 14px 4px 11px; border-radius: 20px; border: 2px solid rgba(255,255,255,0.9);
  cursor: pointer; transition: all .12s;
  box-shadow: 0 2px 5px rgba(150,120,90,0.10);
}
.chip-text { font-size: 11px; font-weight: 800; color: var(--ink); line-height: 1.25; text-align: center; }

.field-label {
  font-size: 12.5px; font-weight: 800; color: var(--ink);
  display: flex; align-items: center; gap: 6px; margin: 10px 0 6px;
}
.field {
  width: 100%; padding: 11px 14px; border-radius: 99px;
  border: 1.5px solid var(--line); font-size: 13.5px; font-weight: 700;
  background: var(--card); outline: none;
  box-shadow: 0 1px 3px rgba(150,120,90,0.06);
}
input.field[type=date] { min-height: 42px; -webkit-appearance: none; appearance: none; }
.add-btn {
  width: 100%; margin-top: 18px; padding: 13px 0; border-radius: 99px;
  background: linear-gradient(180deg, #F6BFC8, #EFA3B0);
  color: #FFF9F0; font-size: 16px; font-weight: 800; letter-spacing: 0.12em;
  border: 2px solid rgba(255,255,255,0.85); cursor: pointer;
  box-shadow: 0 4px 12px rgba(239,163,176,0.45);
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.add-btn:active { transform: translateY(1px); }

/* 明細行 */
.entry-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1.8px dashed #EFE0CB; }
.entry-row:last-child { border-bottom: none; }
.entry-emoji {
  width: 40px; height: 40px; border-radius: 14px; display: flex;
  align-items: center; justify-content: center; flex-shrink: 0;
  border: 1.5px solid rgba(255,255,255,0.9);
}
.entry-main { flex: 1; min-width: 0; }
.entry-name { font-size: 13px; font-weight: 800; }
.entry-sub { font-size: 11px; color: var(--sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.entry-amount { font-weight: 800; font-size: 14px; color: var(--pink-deep); font-variant-numeric: tabular-nums; }
.del-btn {
  width: 26px; height: 26px; border-radius: 99px; border: 1.5px solid var(--line); background: #FBF4E6;
  color: var(--sub2); font-size: 13px; cursor: pointer; flex-shrink: 0; font-weight: 800;
}

/* 月/年ナビ */
.month-nav { display: flex; align-items: center; justify-content: center; gap: 14px; margin: 6px 0 12px; }
.nav-btn {
  width: 38px; height: 38px; border-radius: 99px; border: 1.5px solid var(--line);
  background: var(--card); font-size: 18px; cursor: pointer; color: var(--pink-deep); font-weight: 800;
  box-shadow: 0 1px 3px rgba(150,120,90,0.10);
}
.month-label { font-size: 17px; font-weight: 800; min-width: 116px; text-align: center; color: #93796A; }

/* サマリー */
.summary-caption { font-size: 13.5px; font-weight: 800; }
.hint {
  display: inline-flex; width: 16px; height: 16px; border-radius: 99px; background: #AFC9E5;
  color: #FFF; font-size: 10px; align-items: center; justify-content: center;
  vertical-align: middle; margin-left: 3px; border: none; cursor: pointer; padding: 0;
}
.big-amount { line-height: 1.2; }
.big-amount-pre { font-size: 14px; font-weight: 800; }
.big-amount-num { font-size: 34px; font-weight: 800; color: #8A6F5D; font-variant-numeric: tabular-nums; }
.dashed { border-top: 1.8px dashed #EBDAC2; margin: 12px 0; }
.cat-row { display: flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 800; }
.cat-icon {
  width: 26px; height: 26px; border-radius: 9px; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0;
}
.cat-name { flex: 1; color: var(--ink); }
.cat-pct { font-size: 11px; color: var(--sub); font-weight: 700; }
.cat-val { color: var(--pink-deep); font-variant-numeric: tabular-nums; }
.bar-track { height: 9px; background: #F3E9D8; border-radius: 99px; margin-top: 5px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 99px; transition: width .3s; }
.rank-num {
  width: 21px; height: 21px; border-radius: 99px; font-size: 11px; display: flex;
  align-items: center; justify-content: center; font-weight: 800; flex-shrink: 0;
}
.muted-note { font-size: 13px; color: var(--sub); text-align: center; padding: 8px 0; font-weight: 700; }

/* タブバー */
.tabbar {
  position: fixed; bottom: calc(10px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
  width: calc(100% - 20px); max-width: 410px;
  display: flex; gap: 4px; background: #FFFBF1; border: 1.5px solid var(--line);
  padding: 7px;
  border-radius: 26px;
  box-shadow: 0 4px 16px rgba(150,120,90,0.16); z-index: 10;
}
.tab-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 1px;
  background: none; border: none; cursor: pointer; padding: 8px 0 6px;
  color: var(--sub); border-radius: 20px;
}
.tab-btn.active { color: var(--ink); background: #FADCDC; }
.tab-btn svg { display: block; }
.tab-label { font-size: 11px; font-weight: 800; }

/* トースト */
.toast {
  position: fixed; bottom: calc(104px + env(safe-area-inset-bottom)); left: 50%;
  transform: translateX(-50%);
  background: #8A7260; color: #FFF7EA; font-size: 13px; font-weight: 700;
  padding: 10px 20px; border-radius: 99px; white-space: nowrap;
  box-shadow: 0 4px 12px rgba(123,99,83,0.35); z-index: 30;
  max-width: calc(100vw - 30px); overflow: hidden; text-overflow: ellipsis;
}

/* 設定シート */
.sheet-bg {
  position: fixed; inset: 0; background: rgba(123,99,83,0.35); z-index: 20;
  display: flex; align-items: flex-end; justify-content: center;
}
.sheet {
  width: 100%; max-width: 430px; background: #FFFBF1; border-radius: 26px 26px 0 0;
  padding: 20px 18px calc(24px + env(safe-area-inset-bottom));
  border: 1.5px solid var(--line); border-bottom: none;
}
.sheet-title { font-size: 16px; font-weight: 800; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
.sheet-sub { font-size: 12px; color: var(--sub); font-weight: 700; margin-bottom: 14px; }
.sheet-btn {
  width: 100%; padding: 13px; border-radius: 99px; border: 1.5px solid var(--line);
  background: var(--field); font-size: 14px; font-weight: 800; color: var(--ink);
  cursor: pointer; margin-bottom: 10px; text-align: center; display: block;
}
.sheet-btn.danger { color: #C97878; border-color: #F0CFC9; background: #FCF1EC; }
.sheet-close {
  width: 100%; padding: 12px; border-radius: 99px; border: none;
  background: #F3E9D8; font-size: 14px; font-weight: 800; color: var(--sub);
  cursor: pointer; margin-top: 4px;
}

/* グラフ共通 */
.chart-wrap { width: 100%; }
.chart-wrap svg { display: block; width: 100%; height: auto; }
</style>
</head>

}

// ドーナツグラフ（手描きSVG）
function donutSVG(cats) {
  var size = 190, cx = size / 2, cy = size / 2, r0 = 48, r1 = 76;
  var total = 0;
  cats.forEach(function (c) { total += c.value; });
  if (!total) return "";
  var padDeg = cats.length > 1 ? 2 : 0;
  var avail = 360 - padDeg * cats.length;
  var paths = "";
  var angle = -90;
  cats.forEach(function (c) {
    var sweep = avail * (c.value / total);
    if (sweep <= 0) { return; }
    var a0 = angle, a1 = angle + Math.min(sweep, 359.98);
    angle += sweep + padDeg;
    var rad0 = a0 * Math.PI / 180, rad1 = a1 * Math.PI / 180;
    var large = (a1 - a0) > 180 ? 1 : 0;
    var x0o = cx + r1 * Math.cos(rad0), y0o = cy + r1 * Math.sin(rad0);
    var x1o = cx + r1 * Math.cos(rad1), y1o = cy + r1 * Math.sin(rad1);
    var x0i = cx + r0 * Math.cos(rad1), y0i = cy + r0 * Math.sin(rad1);
    var x1i = cx + r0 * Math.cos(rad0), y1i = cy + r0 * Math.sin(rad0);
    var d = "M" + x0o.toFixed(2) + " " + y0o.toFixed(2) +
      " A" + r1 + " " + r1 + " 0 " + large + " 1 " + x1o.toFixed(2) + " " + y1o.toFixed(2) +
      " L" + x0i.toFixed(2) + " " + y0i.toFixed(2) +
      " A" + r0 + " " + r0 + " 0 " + large + " 0 " + x1i.toFixed(2) + " " + y1i.toFixed(2) + " Z";
    paths += '<path d="' + d + '" fill="' + c.color + '" data-act="showval" data-label="' + esc(c.name) + '" data-value="' + c.value + '" style="cursor:pointer"/>';
  });
  return '<div class="chart-wrap" style="max-width:220px;margin:0 auto">' +
    '<svg viewBox="0 0 ' + size + ' ' + size + '" role="img" aria-label="費目の内訳グラフ">' + paths + '</svg></div>';
}

// 棒グラフ（手描きSVG・月ごと）
function niceMax(v) {
  if (v <= 0) return 1000;
  var pow = Math.pow(10, Math.floor(Math.log10(v)));
  var n = v / pow;
  var nice = n <= 1 ? 1 : n <= 2 ? 2 : n <= 2.5 ? 2.5 : n <= 5 ? 5 : 10;
  return nice * pow;
}
function yTickFmt(v) { return v >= 10000 ? (v / 10000) + "万" : String(v); }
function barChartSVG(arr) {
  var W = 360, H = 190, padL = 38, padR = 6, padT = 12, padB = 20;
  var plotW = W - padL - padR, plotH = H - padT - padB;
  var max = 0;
  arr.forEach(function (d) { if (d.total > max) max = d.total; });
  var yMax = niceMax(max);
  var out = "";
  var steps = 4;
  for (var i = 0; i <= steps; i++) {
    var v = yMax * i / steps;
    var y = padT + plotH - plotH * i / steps;
    out += '<line x1="' + padL + '" y1="' + y + '" x2="' + (W - padR) + '" y2="' + y + '" stroke="#EFE3D0" stroke-dasharray="3 3"/>';
    out += '<text x="' + (padL - 5) + '" y="' + (y + 3.5) + '" text-anchor="end" font-size="10" fill="#B29C8A">' + yTickFmt(v) + '</text>';
  }
  var slot = plotW / arr.length;
  var bw = slot * 0.6;
  arr.forEach(function (d, i) {
    var x = padL + slot * i + (slot - bw) / 2;
    var cxm = padL + slot * i + slot / 2;
    out += '<text x="' + cxm + '" y="' + (H - 6) + '" text-anchor="middle" font-size="10" fill="#B29C8A">' + esc(d.name) + '</text>';
    if (d.total <= 0) return;
    var h = plotH * d.total / yMax;
    var y0 = padT + plotH - h;
    var r = Math.min(6, bw / 2, h);
    var path = "M" + x + " " + (padT + plotH) +
      " L" + x + " " + (y0 + r) +
      " Q" + x + " " + y0 + " " + (x + r) + " " + y0 +
      " L" + (x + bw - r) + " " + y0 +
      " Q" + (x + bw) + " " + y0 + " " + (x + bw) + " " + (y0 + r) +
      " L" + (x + bw) + " " + (padT + plotH) + " Z";
    out += '<path d="' + path + '" fill="#EFA9B5" data-act="showval" data-label="' + esc(d.name) + '" data-value="' + d.total + '" style="cursor:pointer"/>';
  });
  return '<div class="chart-wrap"><svg viewBox="0 0 ' + W + ' ' + H + '" role="img" aria-label="月ごとの支出グラフ">' + out + '</svg></div>';
}

// ---------- 集計 ----------
function getMonthEntries() {
  var p = viewYM.y + "-" + pad2(viewYM.m);
  return entries.filter(function (e) { return e.date.indexOf(p) === 0; })
    .sort(function (a, b) { return b.date.localeCompare(a.date); });
}
function catBreakdown(list) {
  var m = {}, total = 0;
  list.forEach(function (e) { m[e.catId] = (m[e.catId] || 0) + e.amount; total += e.amount; });
  return CATEGORIES.filter(function (c) { return m[c.id]; }).map(function (c) {
    return { id: c.id, name: c.name, color: c.color, chipBg: c.chipBg, value: m[c.id], pct: total ? m[c.id] / total * 100 : 0 };
  }).sort(function (a, b) { return b.value - a.value; });
}
function getYearData() {
  var arr = [];
  for (var i = 0; i < 12; i++) arr.push({ name: (i + 1) + "月", total: 0 });
  var yearEntries = [];
  entries.forEach(function (e) {
    var y = Number(e.date.slice(0, 4)), m = Number(e.date.slice(5, 7));
    if (y === viewYear) { arr[m - 1].total += e.amount; yearEntries.push(e); }
  });
  var yearTotal = 0;
  arr.forEach(function (d) { yearTotal += d.total; });
  return { arr: arr, yearTotal: yearTotal, cats: catBreakdown(yearEntries) };
}

function renderMonth() {
  var list = getMonthEntries();

    body = '<div class="muted-note" style="padding:6px 0">この月の記録はまだないよ</div>';
  } else {
    body = '<div style="text-align:left">' + catBarsHTML(byCat, false) +
      '<div class="dashed"></div>' + donutSVG(byCat) + '</div>';

// ---------- 操作 ----------
function flash(msg) {
  var old = document.querySelector(".toast");
  if (old) old.remove();
  var el = document.createElement("div");
  el.className = "toast";
  el.textContent = msg;
  document.body.appendChild(el);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function () { el.remove(); }, 1800);
}

function addEntry() {
  var v = Number(draft.amount);
  if (!v || v <= 0) { flash("金額を入力してね"); return; }
  if (!draft.catId) { flash("費目を選んでね"); return; }
  if (!/^\d{4}-\d{2}-\d{2}$/.test(draft.date)) { flash("日付を入れてね"); return; }
  var e = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    date: draft.date, amount: Math.round(v), catId: draft.catId, memo: draft.memo.trim()
  };
  entries.unshift(e);
  saveEntries();
  draft.amount = ""; draft.memo = ""; draft.catId = null;
  render();
  flash(yen(e.amount) + " を記録したよ！");
}

function removeEntry(id) {
  entries = entries.filter(function (e) { return e.id !== id; });
  saveEntries();
  render();
  flash("削除したよ");
}

mainEl.addEventListener("click", function (ev) {
  var t = ev.target.closest("[data-act]");
  if (!t) return;
  var act = t.getAttribute("data-act");
  if (act === "pickcat") { draft.catId = t.getAttribute("data-cat"); render(); }
  else if (act === "add") addEntry();
  else if (act === "del") removeEntry(t.getAttribute("data-id"));
  else if (act === "shiftmonth") {
    var d = Number(t.getAttribute("data-d"));
    var m = viewYM.m + d, y = viewYM.y;
    if (m === 0) { m = 12; y -= 1; }
    if (m === 13) { m = 1; y += 1; }
    viewYM = { y: y, m: m };
    render();
  }
  else if (act === "shiftyear") { viewYear += Number(t.getAttribute("data-d")); render(); }
  else if (act === "hint") flash("この月に記録した支出の合計だよ");
  else if (act === "showval") flash(t.getAttribute("data-label") + "：" + yen(Number(t.getAttribute("data-value"))));
});

mainEl.addEventListener("input", function (ev) {
  if (ev.target.id === "inpAmount") draft.amount = ev.target.value;
  else if (ev.target.id === "inpDate") draft.date = ev.target.value;
  else if (ev.target.id === "inpMemo") draft.memo = ev.target.value;
});

tabbarEl.addEventListener("click", function (ev) {
  var t = ev.target.closest("[data-tab]");
  if (!t) return;
  tab = t.getAttribute("data-tab");
  render();
  window.scrollTo(0, 0);
});

// ---------- 設定シート ----------
document.getElementById("gearBtn").addEventListener("click", openSheet);
function openSheet() {
  var bg = document.createElement("div");
  bg.className = "sheet-bg";
  bg.innerHTML = '<div class="sheet">' +
    '<div class="sheet-title">' + bunnyFace(24) + '設定</div>' +
    '<div class="sheet-sub">記録は ' + entries.length + ' 件。データはこの端末の中だけに保存されます。</div>' +
    '<button class="sheet-btn" id="btnExport">📤 バックアップを保存（JSON）</button>' +
    '<label class="sheet-btn" for="fileImport" style="cursor:pointer">📥 バックアップから復元（JSON）</label>' +
    '<input type="file" id="fileImport" accept=".json,application/json" style="display:none">' +
    '<button class="sheet-btn danger" id="btnWipe">🗑️ データを全部消す</button>' +
    '<button class="sheet-close" id="btnCloseSheet">閉じる</button>' +
    '</div>';
  document.body.appendChild(bg);
  bg.addEventListener("click", function (ev) { if (ev.target === bg) bg.remove(); });
  bg.querySelector("#btnCloseSheet").addEventListener("click", function () { bg.remove(); });
  bg.querySelector("#btnExport").addEventListener("click", function () {
    var blob = new Blob([JSON.stringify({ entries: entries }, null, 2)], { type: "application/json" });
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "okozukai-backup-" + todayStr() + ".json";
    a.click();
    setTimeout(function () { URL.revokeObjectURL(a.href); }, 1000);
    flash("バックアップを保存したよ");
  });
  bg.querySelector("#fileImport").addEventListener("change", function (ev) {
    var f = ev.target.files[0];
    if (!f) return;
    var reader = new FileReader();
    reader.onload = function () {
      try {
        var d = JSON.parse(reader.result);
        var list = Array.isArray(d) ? d : d.entries;
        if (!Array.isArray(list)) throw new Error("format");
        var ok = list.every(function (e) { return e && e.id && e.date && typeof e.amount === "number"; });
        if (!ok) throw new Error("format");
        if (!confirm("いまの記録（" + entries.length + "件）を、このバックアップ（" + list.length + "件）で置き換えます。よい？")) return;
        entries = list;
        saveEntries();
        render();
        bg.remove();
        flash("復元したよ（" + list.length + "件）");
      } catch (e) {
        flash("読み込めなかった…ファイルを確認してね");
      }
    };
    reader.readAsText(f);
  });
  bg.querySelector("#btnWipe").addEventListener("click", function () {
    if (!confirm("本当に全部消す？この操作は取り消せないよ。")) return;
    entries = [];
    saveEntries();
    render();
    bg.remove();
    flash("全部消したよ");
  });
}

// ---------- 起動 ----------
render();
if ("serviceWorker" in navigator && location.protocol.indexOf("http") === 0) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("./sw.js").catch(function () {});
  });
}
</script>
